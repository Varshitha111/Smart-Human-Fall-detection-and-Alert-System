<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Fall Detection System</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #ffffff;          /* Pure white background */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-container {
            background: #ffffff;
            padding: 40px 35px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid #e0e0e0;
        }
        h1 {
            color: #333333;
            font-size: 28px;
            margin: 0 0 8px;
        }
        .subtitle {
            color: #555555;
            font-size: 16px;
            margin: 0 0 30px;
        }
        .project-info {
            color: #666666;
            font-size: 15px;
            margin-bottom: 35px;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: 1px solid #cccccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input[type="submit"] {
            width: 100%;
            padding: 14px;
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 17px;
            margin-top: 15px;
            transition: background-color 0.2s;
        }
        input[type="submit"]:hover {
            background-color: #b71c1c;
        }
        .error {
            color: #d32f2f;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>Fall Detection & Alert System</h1>
        <!-- <p class="subtitle">Nalla Narasimha Reddy Group of Institutions</p> -->
        <p class="project-info">Major Project 2025-2026</p>

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}

        <form method="post">
            <input type="text" name="username" placeholder="Username" required autofocus>
            <input type="password" name="password" placeholder="Password" required>
            <input type="submit" value="Login">
        </form>
    </div>
</body>
</html>
